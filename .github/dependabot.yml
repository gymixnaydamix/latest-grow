# ============================================================================
# Dependabot Configuration — D-School 2049
# ============================================================================
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
# ============================================================================

version: 2

updates:
  # ── Frontend (root) ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend):"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      radix:
        patterns:
          - "@radix-ui/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      dev-tools:
        dependency-type: "development"
        patterns:
          - "eslint*"
          - "typescript"
          - "@typescript-eslint/*"
          - "prettier"

  # ── Backend ─────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend):"
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      express:
        patterns:
          - "express"
          - "@types/express"
          - "cors"
          - "helmet"
          - "cookie-parser"
      auth:
        patterns:
          - "jsonwebtoken"
          - "bcrypt"
          - "@types/jsonwebtoken"
          - "@types/bcrypt"

  # ── GitHub Actions ──────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps):"

  # ── Docker ──────────────────────────────────────────────────────────────
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "infrastructure"
    commit-message:
      prefix: "deps(docker):"
