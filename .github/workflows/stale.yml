name: Stale Issue Cleanup

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity for 30 days. It will be closed in 7 days if no further
            activity occurs. If this is still relevant, please comment or remove the
            stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had recent activity for 14 days. It will be closed in 7 days if no
            further activity occurs.
          close-issue-message: "Closed due to inactivity. Please reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Please reopen if still relevant."
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,critical,in-progress"
          exempt-pr-labels: "pinned,security,critical,in-progress"
          exempt-all-milestones: true
