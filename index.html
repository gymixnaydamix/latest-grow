<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GROW YouR NEED — All-in-one SaaS Super App for schools and individuals" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <!-- Critical CSS: instant body paint before full stylesheet arrives -->
    <style>
      :root{--background:oklch(1 0 0);--foreground:oklch(0.145 0 0);--primary:oklch(0.205 0 0);--accent:oklch(0.97 0 0);--border:oklch(0.922 0 0);--muted-foreground:oklch(0.556 0 0)}
      .dark{--background:oklch(0.145 0 0);--foreground:oklch(0.985 0 0);--primary:oklch(0.922 0 0);--accent:oklch(0.269 0 0);--border:oklch(1 0 0/10%);--muted-foreground:oklch(0.708 0 0)}
      body{margin:0;min-height:100vh;background:var(--background);color:var(--foreground);font-family:system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      @keyframes pulse{50%{opacity:.5}}
      .animate-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
    </style>
    <title>GROW YouR NEED</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
